name: Update BOM Forecast

on:
  schedule:
    # Run at 2am, 8am, 2pm, 8pm UTC (covers multiple times per day)
    - cron: '0 2,8,14,20 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  update-forecast:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 pandas matplotlib numpy
      
      - name: Generate forecast plot
        run: |
          python _scripts/generate_forecast.py
      
      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add images/bom_forecast_*.png files/forecast_metadata.json
          git commit -m "Update BOM forecast plots" --allow-empty
          git push
